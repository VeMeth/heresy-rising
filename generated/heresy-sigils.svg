<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
<!--
  HERESY RISING — sigil sprite
  Usage:  <svg class="hr-sigil"><use href="/assets/heresy-sigils.svg#hr-priest"/></svg>
  All glyphs are 24x24, monoline, and inherit `currentColor`.
  Set size + color from CSS:  .hr-sigil { width:1em; height:1em; stroke:currentColor; fill:none }
-->

<defs>
  <style>
    symbol { stroke: currentColor; fill: none; stroke-width: 1.4;
             stroke-linecap: round; stroke-linejoin: round; }
    symbol .solid { fill: currentColor; stroke: none; }
    symbol .hair  { stroke-width: 1; }
  </style>
</defs>

<!-- ══════════ ROLE SIGILS ══════════ -->

<!-- PRIEST / LOYALIST — patriarchal cross within a nimbus -->
<symbol id="hr-priest" viewBox="0 0 24 24">
  <circle cx="12" cy="8" r="4.4" class="hair"/>
  <path d="M12 2.6V21"/>
  <path d="M8 8h8"/>
  <path d="M9.6 12.6h4.8"/>
  <path d="M9.4 21h5.2"/>
</symbol>

<!-- MURDERER / HERETIC — inverted dagger, horned quillons -->
<symbol id="hr-murderer" viewBox="0 0 24 24">
  <path d="M12 4.4v13.2"/>
  <path d="M10.4 17.6 12 21.4l1.6-3.8z"/>
  <path d="M7.2 8.6h9.6"/>
  <path d="M7.2 8.6C7.2 6 8.4 4.8 9.6 4.4"/>
  <path d="M16.8 8.6C16.8 6 15.6 4.8 14.4 4.4"/>
  <path d="m12 1.6 1.5 1.6L12 4.8 10.5 3.2z"/>
</symbol>

<!-- INTERROGATOR — probe descending into an open eye -->
<symbol id="hr-interrogator" viewBox="0 0 24 24">
  <path d="M2.8 15c3-4.2 15.4-4.2 18.4 0-3 4.2-15.4 4.2-18.4 0z"/>
  <circle cx="12" cy="15" r="2.3" class="solid"/>
  <path d="M12 1.8v9"/>
  <path d="m9.4 6.2 2.6 2.6 2.6-2.6"/>
</symbol>

<!-- CHIRURGEON — curved needle above a sutured wound -->
<symbol id="hr-chirurgeon" viewBox="0 0 24 24">
  <path d="M5.6 9.4A7 7 0 0 1 18.4 6"/>
  <path d="m18.4 6 1.6-2.2"/>
  <path d="M4.4 16h15.2"/>
  <path d="m7.2 13 2.4 6"/>
  <path d="m11 13 2.4 6"/>
  <path d="m14.8 13 2.4 6"/>
</symbol>

<!-- IMPERIAL CITIZEN — punched ration seal -->
<symbol id="hr-citizen" viewBox="0 0 24 24">
  <path d="M7 3h10l3 3v12l-3 3H7l-3-3V6z"/>
  <circle cx="12" cy="8" r="1.3"/>
  <path d="M8 12.6h8"/>
  <path d="M8 16h5.4"/>
</symbol>

<!-- UNKNOWN / UNREVEALED — blank wax impression -->
<symbol id="hr-unknown" viewBox="0 0 24 24">
  <path d="M12 2.4c2.4 0 3.4 1.6 5.4 2.4s3.8.6 4 3.2-1 3.2-.8 5 1.2 2.8-.6 4.4-3.6.8-5.4 1.8-2.2 1.6-4.6.8-2.2-2-4-2.8-3.6-.4-4.4-2.6.4-3.2 0-5-1-3.2.8-4.6 3-1.2 4.8-2.2S9.6 2.4 12 2.4Z"/>
  <path d="M12 15.4v.1"/>
  <path d="M9.6 9.6a2.5 2.5 0 1 1 3.2 2.4c-.6.2-.8.7-.8 1.4"/>
</symbol>

<!-- ── LOYALIST ────────────────────────────────────────────────── -->

<!-- ARBITRATOR — the interposed shield, bearing the scales -->
<symbol id="hr-arbitrator" viewBox="0 0 24 24">
  <path d="M12 2.4 20.2 5.6v6.3c0 4.7-3.5 7.9-8.2 9.1-4.7-1.2-8.2-4.4-8.2-9.1V5.6z"/>
  <path d="M6.6 10.2h10.8"/>
  <path d="M12 7.8v2.4M12 10.2v6.4"/>
  <path d="M5.1 10.6 6.6 13.8 8.1 10.6" class="hair"/>
  <path d="M15.9 10.6 17.4 13.8 18.9 10.6" class="hair"/>
</symbol>

<!-- NOVICE-PSYCHIC — a small flame, a spiral not yet resolved -->
<symbol id="hr-novice-psychic" viewBox="0 0 24 24">
  <path d="M12 2.2c0 4.9-5.7 6.5-5.7 11.8a5.7 5.7 0 0 0 11.4 0c0-5.3-5.7-6.9-5.7-11.8Z"/>
  <path d="M12.6 17.9a2.7 2.7 0 1 1-2.1-4.7c1.5-.7 3.1.5 2.9 1.9-.2 1.2-1.6 1.6-2.2 1" class="hair"/>
</symbol>

<!-- SANCTIONED PSYKER — raw warp power, collared -->
<symbol id="hr-sanctioned-psyker" viewBox="0 0 24 24">
  <path d="M14.4 1.8 7.8 12.6h4L9.6 19 17 8.6h-4z"/>
  <ellipse cx="12" cy="20.2" rx="6" ry="2.2"/>
  <path d="M6 20.2v-1.4M18 20.2v-1.4" class="hair"/>
</symbol>

<!-- ── HERETIC ─────────────────────────────────────────────────── -->

<!-- SABOTEUR — the sprung trap -->
<symbol id="hr-saboteur" viewBox="0 0 24 24">
  <path d="M3.4 9.4Q12 3 20.6 9.4"/>
  <path d="M5.2 9.8 7.6 12.6 10 9.8 12.4 12.6 14.8 9.8 17.2 12.6 19.2 10.2"/>
  <path d="M3.4 15.4Q12 21.8 20.6 15.4"/>
  <path d="M5.2 15 7.6 12.2 10 15l2.4-2.8L14.8 15l2.4-2.8 2 2.4"/>
  <path d="M3.4 9.4v6M20.6 9.4v6"/>
</symbol>

<!-- HERETIC PRIEST — the priest's own sigil, inverted, halo broken -->
<symbol id="hr-heretic-priest" viewBox="0 0 24 24">
  <circle cx="12" cy="16" r="4.4" stroke-dasharray="3.4 2.6" class="hair"/>
  <path d="M12 2.6v18.8"/>
  <path d="M8 16h8"/>
  <path d="M9.6 11.4h4.8"/>
  <path d="m12 2.6-2 2.6M12 2.6l2 2.6"/>
</symbol>

<!-- RECRUITER — the catalyst; a soul crosses over and takes horns -->
<symbol id="hr-recruiter" viewBox="0 0 24 24">
  <circle cx="6.2" cy="6.4" r="3.4"/>
  <path d="M8.8 8.8C10.4 11 11.8 12.6 13.6 14.2"/>
  <path d="M10.7 13.8 13.6 14.2 12.2 11.6"/>
  <circle cx="17.4" cy="17" r="3.4"/>
  <path d="m15.2 14.6-1.2-2.6M19.6 14.6l1.2-2.6"/>
  <circle cx="17.4" cy="17" r="1" class="solid"/>
</symbol>

<!-- CONSPIRATOR — a dispatch, and the copy no one wrote -->
<symbol id="hr-conspirator" viewBox="0 0 24 24">
  <rect x="8.6" y="3.2" width="11.8" height="8" stroke-dasharray="3 2.4" class="hair"/>
  <path d="M3.6 8.2h11.8v8H8.2l-3 3.2V16.2H3.6z"/>
  <path d="M6.2 11h7M6.2 13.6h4.4" class="hair"/>
</symbol>

<!-- ══════════ STATUS MARKS ══════════ -->

<!-- ALIVE — pulse within a ring -->
<symbol id="hr-alive" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="9" class="hair"/>
  <path d="M5.6 12h2.8l1.6-3.6 3.2 7.2 1.6-3.6h3.6"/>
</symbol>

<!-- DECEASED — skull -->
<symbol id="hr-deceased" viewBox="0 0 24 24">
  <path d="M5.4 12.4a6.6 6.6 0 0 1 13.2 0v2.2a2 2 0 0 1-2 2H7.4a2 2 0 0 1-2-2z"/>
  <circle cx="9.2" cy="12.4" r="1.7" class="solid"/>
  <circle cx="14.8" cy="12.4" r="1.7" class="solid"/>
  <path d="M12 15.2v1.4"/>
  <path d="M8.6 16.6v3.2M12 16.6v3.6M15.4 16.6v3.2"/>
  <path d="M7.6 20h8.8" class="hair"/>
</symbol>

<!-- OBSERVING — open eye, no probe -->
<symbol id="hr-observing" viewBox="0 0 24 24">
  <path d="M2.4 12c3.2-4.6 16-4.6 19.2 0-3.2 4.6-16 4.6-19.2 0z"/>
  <circle cx="12" cy="12" r="2.6"/>
</symbol>

<!-- SILENCED / SEALED CHANNEL — padlock with cross -->
<symbol id="hr-sealed" viewBox="0 0 24 24">
  <rect x="4.6" y="10" width="14.8" height="10.4" rx="1.6"/>
  <path d="M8.4 10V7.6a3.6 3.6 0 0 1 7.2 0V10"/>
  <path d="M12 13v4.4M10.1 15.2h3.8"/>
</symbol>

<!-- ══════════ PHASE MARKS ══════════ -->

<!-- DAY — barbed sun -->
<symbol id="hr-day" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="4.2"/>
  <path d="M12 1.4v3.4M12 19.2v3.4M22.6 12h-3.4M4.8 12H1.4"/>
  <path d="m19.5 4.5-2.4 2.4M6.9 17.1l-2.4 2.4M19.5 19.5l-2.4-2.4M6.9 6.9 4.5 4.5" class="hair"/>
</symbol>

<!-- NIGHT — crescent and cinders -->
<symbol id="hr-night" viewBox="0 0 24 24">
  <path d="M20.4 15.2A8.4 8.4 0 1 1 10.6 3.4a6.6 6.6 0 0 0 9.8 11.8z"/>
  <path d="M18.6 4.2v.1M21 7.4v.1M16.4 7.6v.1" stroke-width="1.8"/>
</symbol>

<!-- ══════════ EVENT GLYPHS (for the log gutter) ══════════ -->

<!-- ACCUSATION — the pointed finger, abstracted -->
<symbol id="hr-accusation" viewBox="0 0 24 24">
  <circle cx="18.6" cy="12" r="3.4"/>
  <path d="M2 12h10.4"/>
  <path d="m9.4 8.8 3.2 3.2-3.2 3.2"/>
</symbol>

<!-- VOTE — tally marks, struck -->
<symbol id="hr-vote" viewBox="0 0 24 24">
  <path d="M5.4 6.6v10.8M9.6 6.6v10.8M13.8 6.6v10.8M18 6.6v10.8"/>
  <path d="M3.4 17 20 7"/>
</symbol>

<!-- VERDICT — the seal press -->
<symbol id="hr-verdict" viewBox="0 0 24 24">
  <circle cx="12" cy="3.8" r="2"/>
  <path d="M12 5.8v3.8"/>
  <path d="M6.6 9.6h10.8L15.6 14H8.4z"/>
  <path d="M4.4 17.6h15.2"/>
  <path d="m7.4 20 1.2-1.6M16.6 20l-1.2-1.6" class="hair"/>
</symbol>

<!-- EXECUTION — dagger through a ring -->
<symbol id="hr-execution" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="6.4" class="hair"/>
  <path d="M12 1.8v20.4"/>
  <path d="M8.8 6h6.4"/>
</symbol>

<!-- VOX / TRANSMIT — horn and carrier waves -->
<symbol id="hr-vox" viewBox="0 0 24 24">
  <path d="M3.4 9.4 10.6 5v14l-7.2-4.4z"/>
  <path d="M14 8.8a5 5 0 0 1 0 6.4"/>
  <path d="M17 6a9 9 0 0 1 0 12"/>
</symbol>

<!-- CONCLAVE / ASSEMBLY — five figures round a table -->
<symbol id="hr-conclave" viewBox="0 0 24 24">
  <circle cx="12" cy="12" r="4.2" class="hair"/>
  <circle cx="12" cy="3.6" r="1.9"/>
  <circle cx="19.4" cy="8.2" r="1.9"/>
  <circle cx="16.6" cy="18.4" r="1.9"/>
  <circle cx="7.4" cy="18.4" r="1.9"/>
  <circle cx="4.6" cy="8.2" r="1.9"/>
</symbol>

<!-- HERESY MARK — the game's own rune, for favicons and loading states -->
<symbol id="hr-mark" viewBox="0 0 24 24">
  <path d="m12 1.4 10.6 10.6L12 22.6 1.4 12z"/>
  <path d="M8.6 8.2v7.6M15.4 8.2v7.6M8.6 12h6.8"/>
</symbol>

</svg>
