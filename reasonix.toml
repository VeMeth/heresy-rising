ck only re-voting for the SAME target — bots can still change their\n  vote if new intel comes in, which is legitimate gameplay.\n- On round change, reset _lastVoteTarget to null.\" && git push)", "Bash(cd /home/node/.openclaw/workspace/heretic/heresy-rising-site && npm --prefix heresy-server test 2>&1 | head -5)", "Bash(cd /home/node/.openclaw/workspace/heretic/heresy-rising-site && git add heresy-server/src/heresyGameManager.js && git commit -m \"fix(server): vote threshold based on actual voters, not total alive\n\nWith 3 alive and only 1 vote cast for Town, the old threshold\n(Math.floor(3/2)+1 = 2) rejected the vote. Now the threshold is\nbased on the number of people who actually voted (Math.floor(voters/2)+1),\nso a unanimous single voter is enough. Skip majority (stand down >\nhalf of alive) still works the same way.\" && git push)", "Bash(cd /home/node/.openclaw/workspace/heretic/heresy-rising-site && git add -A && git commit -m \"chore(css): prune dead styles, fix --text bug, remove dead game/ components\n\n- Fix: undefined CSS var --text in LobbyView.vue (was invisible on dark bg)\n- Remove: dead CSS vars --ink and --red from :root (never referenced)\n- Remove: 16 unused selectors from style.css (private-role, advance,\n  earlier-toggle, earlier-day, and mismatched child selectors under\n  role-card, reveal-list, order-block, empty-chat)\n- Remove: 9 dead components under game/ (~2368 lines, prior card-game\n  project — tree-shaken from bundle but cluttering the source)\")", "Bash(cd /home/node/.openclaw/workspace/heretic/heresy-rising-site && git add -A && git commit -m \"fix(client): explicitly select Public channel at game start\n\nThe channel ref was initialized to 'public' but was only set via\nchangeChannel() when a user clicked a tab. In the lobby→game\ntransition, the socket game:state event can arrive before\nstartGame()'s message reset, causing GameView to mount with\nstale message state. Explicitly reset channel.value = 'public'\nin startGame()