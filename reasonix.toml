l firing within a 2-second window.\n- Add _botOnlyStreak counter: bots stop auto-replying after 10\n  consecutive bot-only messages. Reset on any human message.\n  Prevents endless bot↔bot loops without banning bot replies entirely.\" && git push)", "Bash(cd /home/node/.openclaw/workspace/heretic/heresy-rising-site && git add bot-manager/src/prompts/gameState.js bot-manager/src/rest.js bot-manager/src/session.js heresy-client/src/components/AdminView.vue && git commit -m \"fix(bot-manager): repair alivePlayers prompt, add valid target lists, compress phase memory, widen stagger\n\n- Fix broken alivePlayers display in prompt (was always rendering 'see chat'\n  due to truthy .toString check on arrays). Now actually lists player codes.\n- Add Valid vote targets line during day (self excluded, skip noted).\n- Add Valid night action targets line at night (respects role self-target rules).\n- Replace aggressive phase-change memory flush with _persistPhaseMemory():\n  compresses short-term events into a compact phase-{round}-{phase} note before\n  flushing, so the LLM retains summaries via LONG-TERM NOTES instead of 20 raw\n  history lines. Old phase notes are pruned (max 6).\n- Widen chat jitter range to 0..botActionDelayMs (0-10s) so bots stagger\n  meaningfully instead of firing LLM calls within a 2s window.\n- Add _botOnlyStreak counter: bots stop auto-replying after 10 consecutive\n  bot-only messages; reset on any human message.\n- Add memoryBytes and tokensUsed to GET /bots list response so admin table\n  columns show real data.\n- Update admin Memory tab to show phase summaries from notes alongside\n  current-phase short-term events.\" && git push)", "Bash(sed -n '66p' heresy-server/src/index.js | head -c 300)", "Bash(sed -n '66p' heresy-server/src/index.js | cat -v)", "Bash(sed -n '89p' heresy-server/src/index.js | cat -v | grep -oP 'Authorization.*?\\$')", "Bash(cd /home/node/.openclaw/workspace/heretic/heresy-rising-site && git add bot-manager/src/rest.js heresy