map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # connect-src 'self' covers wss to the same origin (socket.io is reverse-proxied under our origin);
    # bare ws:/wss: schemes were removed so a compromised script cannot exfiltrate to an attacker's WebSocket.
    # frame-ancestors 'self' allows the SPA to be embedded in a same-origin frame
    # (e.g. testing, or another page on the same domain).
    # 'unsafe-inline' + 'unsafe-eval' in script-src are needed because VitePress
    # and Vue both emit small inline hydration scripts; without them the docs
    # and SPA both fail to boot. The trade-off is documented as a known risk.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; frame-src 'self'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self';" always;

    # SPA + VitePress docs share one document root. The Docker build copies
    # the VitePress output into /docs/ inside the SPA dist. try_files tries
    # the URL as-is, then with .html extension (VitePress extensionless URLs
    # like /docs/how-to-play → /docs/how-to-play.html), then the directory
    # index, then the SPA shell as a last resort.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /socket.io/ {
        proxy_pass http://heresy-server:PORT_PLACEHOLDER/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        proxy_set_header Origin $http_origin;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://heresy-server:PORT_PLACEHOLDER/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
